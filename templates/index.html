<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIGHT CLUB - P2P Matching System</title>
  <!-- React, ReactDOM, Babel (CDN - cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  
  <style>
    /* FIGHT CLUB プレミアム・サイバーパンクデザインシステム */
    :root {
      --bg-color: #050505;
      --card-bg: #0d0d0d;
      --accent-pink: #ff007f;
      --accent-cyan: #00ffff;
      --text-color: #ffffff;
      --text-muted: #888888;
      --border-color: #222222;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin: 0;
      text-shadow: 0 0 10px var(--accent-pink), 0 0 20px rgba(255, 0, 127, 0.5);
      color: #fff;
    }
    .subtitle {
      color: var(--accent-cyan);
      font-size: 0.9rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 10px;
      text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    }
    section {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    h2 {
      font-size: 1.5rem;
      color: #fff;
      border-left: 4px solid var(--accent-pink);
      padding-left: 15px;
      margin-top: 0;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input[type="text"], select {
      width: 100%;
      background-color: #000;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 12px;
      font-size: 1rem;
      border-radius: 2px;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--accent-pink);
      box-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
    }
    button {
      background-color: var(--accent-pink);
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
      border-radius: 2px;
      text-transform: uppercase;
    }
    button:hover {
      background-color: #e00070;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }
    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: #fff;
      box-shadow: none;
    }
    /* 登録タイプ切り替え */
    .register-type-box {
      background: #000;
      border: 1px solid var(--border-color);
      padding: 16px;
      margin-bottom: 24px;
      border-radius: 2px;
    }
    .radio-group {
      display: flex;
      gap: 24px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
    }
    .radio-label input[type="radio"] {
      accent-color: var(--accent-pink);
    }
    /* タイムチップ */
    .btn-select-trigger {
      width: 100%;
      background: #000;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 12px;
      cursor: pointer;
      text-align: center;
      font-size: 0.9rem;
    }
    .btn-select-trigger:hover {
      border-color: var(--accent-pink);
    }
    .selected-time-badge {
      background-color: #111;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .selected-time-badge:hover {
      border-color: var(--accent-pink);
    }
    /* タググループ */
    .tag-group-box {
      border: 1px solid var(--border-color);
      background-color: #000;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 2px;
    }
    .tag-category-title {
      display: block;
      font-size: 0.8rem;
      color: var(--accent-cyan);
      margin-bottom: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .tag-chip {
      background: #111;
      border: 1px solid var(--border-color);
      color: #ccc;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 2px;
      margin-right: 8px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    .tag-chip:hover {
      border-color: #888;
      color: #fff;
    }
    .tag-chip.active {
      background: var(--accent-pink);
      border-color: var(--accent-pink);
      color: #fff;
      box-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
    }
    /* 掲示板カード */
    .suggestion-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s, border-color 0.2s;
    }
    .suggestion-card:hover {
      transform: translateY(-2px);
    }
    .white-tag {
      font-size: 0.75rem;
      background: #222;
      color: #ccc;
      padding: 4px 8px;
      border-radius: 2px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .btn-delete-small {
      background: transparent;
      border: none;
      color: #ff3333;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-delete-small:hover {
      text-decoration: underline;
    }
    .btn-direct-confirm {
      width: 100%;
      font-size: 0.8rem;
      padding: 8px 12px;
      margin-top: 10px;
    }
    /* トースト通知 */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 14px 24px;
      border-radius: 2px;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      min-width: 260px;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* モーダル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .modal-mini-window {
      background: var(--card-bg);
      border: 1px solid var(--accent-pink);
      padding: 24px;
      width: 400px;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      margin: 0;
      border: none;
      padding: 0;
      font-size: 1.2rem;
    }
    .btn-close-modal {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }
    /* イベント画面 */
    .event-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .event-card {
      background: #000;
      border: 1px solid var(--border-color);
      padding: 20px;
      border-radius: 2px;
    }
    .event-card h3 {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .highlight {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent-pink);
      margin: 0;
    }
    .badge {
      background: #222;
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 6px 12px;
      border-radius: 2px;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .status-banner {
      background: #111;
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      padding: 12px;
      text-align: center;
      margin-bottom: 30px;
      font-size: 0.9rem;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    /* グリッドテーブル */
    .grid-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    .grid-table th, .grid-table td {
      border: 1px solid var(--border-color);
      padding: 12px;
      text-align: left;
    }
    .grid-table th {
      background-color: #000;
      color: var(--accent-cyan);
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .grid-table td {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- React アプリケーションコード (Babelでトランスパイル) -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const TIME_SLOT_OPTIONS = [
      { id: "1", label: "1限 (08:40-09:55)", start: "08:40", end: "09:55" },
      { id: "2", label: "2限 (10:10-11:25)", start: "10:10", end: "11:25" },
      { id: "3", label: "3限 (12:15-13:30)", start: "12:15", end: "13:30" },
      { id: "4", label: "4限 (13:45-15:00)", start: "13:45", end: "15:00" },
      { id: "5", label: "5限 (15:15-16:30)", start: "15:15", end: "16:30" },
      { id: "6", label: "6限 (16:45-18:00)", start: "16:45", end: "18:00" },
      { id: "7", label: "放課後 (18:30-ANYTIME)", start: "18:30", end: "ANYTIME" },
    ];
    const DAYS_OF_WEEK = [
      { value: "Mon", label: "月曜日" },
      { value: "Tue", label: "火曜日" },
      { value: "Wed", label: "水曜日" },
      { value: "Thu", label: "木曜日" },
      { value: "Fri", label: "金曜日" },
    ];
    const HOBBY_TAG_GROUPS = [
      {
        category: "アナログゲーム",
        tags: ["ボードゲーム", "カタン", "カルカソンヌ", "人狼ゲーム", "ドミニオン", "将棋", "チェス"],
      },
      {
        category: "伝統・麻雀",
        tags: ["麻雀", "三人麻雀", "雀魂"],
      },
      {
        category: "Switch・対戦協力",
        tags: ["スマブラ", "マリオカート", "スプラトゥーン", "ポケモン", "モンハン"],
      },
      {
        category: "カードゲーム",
        tags: ["ポケモンカード", "遊戯王", "デュエマ", "MTG", "シャドウバース"],
      },
      {
        category: "PC・スマホ",
        tags: ["Apex Legends", "VALORANT", "LoL", "Minecraft"],
      },
    ];
    // ブラウザ上でのAPIクライアント実装
    const BASE_URL = window.location.origin; // 同一オリジンでFlaskに通信
    const api = {
      async getUsers() {
        const res = await fetch(`${BASE_URL}/api/users`);
        return res.json();
      },
      async getMatches() {
        const res = await fetch(`${BASE_URL}/api/matches`);
        return res.json();
      },
      async registerUser(data) {
        const res = await fetch(`${BASE_URL}/api/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "登録に失敗しました");
        }
        return res.json();
      },
      async triggerMatching() {
        const res = await fetch(`${BASE_URL}/api/match`, { method: "POST" });
        return res.json();
      }
    };
    function App() {
      const [users, setUsers] = useState([]);
      const [matches, setMatches] = useState([]);
      const [statusMessage, setStatusMessage] = useState("");
      const [loading, setLoading] = useState(false);
      const [view, setView] = useState("dashboard");
      const [showDebug, setShowDebug] = useState(false);
      const [activeEvent, setActiveEvent] = useState(null);
      const [matchedPeople, setMatchedPeople] = useState([]);
      const [otherTagInput, setOtherTagInput] = useState("");
      const [activeModal, setActiveModal] = useState("none");
      const [selectedDay, setSelectedDay] = useState("Mon");
      const [selectedSlotIndex, setSelectedSlotIndex] = useState(0);
      const [customDay, setCustomDay] = useState("Mon");
      const [customTimeText, setCustomTimeText] = useState("");
      const [toasts, setToasts] = useState([]);
      const [filterGameSearch, setFilterGameSearch] = useState("");
      const [filterDay, setFilterDay] = useState("ALL");
      const [filterImmediateOnly, setFilterImmediateOnly] = useState(false);
      const [chatMessages, setChatMessages] = useState([]);
      const [chatInput, setChatInput] = useState("");
      const [deletedIds, setDeletedIds] = useState(() => {
        try {
          const saved = localStorage.getItem("fight_club_deleted_ids");
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });
      const [registerType, setRegisterType] = useState("host");
      const [userForm, setUserForm] = useState({
        nickname: "",
        games: [],
        availability: [],
        customLocation: "7A101",
        comment: "",
        snsContact: "", 
        capacity: "4",
      });
      useEffect(() => {
        const savedNickname = localStorage.getItem("fight_club_preset_nickname") || "";
        const savedLocation = localStorage.getItem("fight_club_preset_location") || "7A101";
        setUserForm(prev => ({
          ...prev,
          nickname: savedNickname,
          customLocation: savedLocation
        }));
      }, []);
      useEffect(() => {
        localStorage.setItem("fight_club_preset_nickname", userForm.nickname);
        localStorage.setItem("fight_club_preset_location", userForm.customLocation);
      }, [userForm.nickname, userForm.customLocation]);
      const addToast = (message, type = "success") => {
        const id = Date.now() + Math.random();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 3000);
      };
      const refreshAll = async () => {
        setLoading(true);
        try {
          const [u, m] = await Promise.all([
            api.getUsers(),
            api.getMatches(),
          ]);
          setUsers(u || []);
          setMatches(m || []);
        } catch (err) {
          setStatusMessage(`データの同期に失敗しました: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };
      useEffect(() => {
        refreshAll();
        
        // 5秒おきにステータス確認・更新
        const timer = setInterval(() => {
          refreshAll();
        }, 5000);
        return () => clearInterval(timer);
      }, []);
      const handleTriggerMatchingEngine = () => {
        setLoading(true);
        setStatusMessage("マッチングエンジンを回しています...");
        api.triggerMatching()
          .then(async () => {
            addToast("マッチング処理が完了しました", "success");
            setStatusMessage("マッチング完了。");
            await refreshAll();
          })
          .catch(() => {
            addToast("マッチング処理に失敗しました", "error");
          })
          .finally(() => setLoading(false));
      };
      const handleAddStandardTime = () => {
        const targetSlot = TIME_SLOT_OPTIONS[selectedSlotIndex];
        if (!targetSlot) return;
        const newSlot = { day: selectedDay, start: targetSlot.start, end: targetSlot.end };
        const exists = userForm.availability.some(s => s.day === newSlot.day && s.start === newSlot.start);
        if (!exists) {
          setUserForm({ ...userForm, availability: [...userForm.availability, newSlot] });
          addToast("空き時間をリストに追加しました", "info");
        } else {
          addToast("その枠はすでに登録されています", "error");
        }
        setActiveModal("none");
      };
      const handleAddCustomTime = () => {
        const text = customTimeText.trim();
        if (!text) return;
        const newSlot = { day: customDay, start: text, end: "CUSTOM" };
        const exists = userForm.availability.some(s => s.day === newSlot.day && s.start === newSlot.start);
        if (!exists) {
          setUserForm({ ...userForm, availability: [...userForm.availability, newSlot] });
          setCustomTimeText("");
          addToast("カスタム時間を追加しました", "info");
        }
        setActiveModal("none");
      };
      const handleRemoveSelectedSlot = (index) => {
        const nextList = userForm.availability.filter((_, i) => i !== index);
        setUserForm({ ...userForm, availability: nextList });
      };
      const handleToggleTag = (tag) => {
        const isSelected = userForm.games.includes(tag);
        const nextGames = isSelected
          ? userForm.games.filter((g) => g !== tag)
          : [...userForm.games, tag];
        setUserForm({ ...userForm, games: nextGames });
      };
      const handleAddCustomTag = () => {
        const trimmed = otherTagInput.trim();
        if (!trimmed) return;
        if (!userForm.games.includes(trimmed)) {
          setUserForm({ ...userForm, games: [...userForm.games, trimmed] });
          setOtherTagInput("");
        }
      };
      const handleDeleteUser = (id) => {
        if (!confirm("このエントリー募集を取り消しますか？")) return;
        const nextDeletedIds = [...deletedIds, id];
        setDeletedIds(nextDeletedIds);
        localStorage.setItem("fight_club_deleted_ids", JSON.stringify(nextDeletedIds));
        addToast("募集エントリーを取り消しました", "success");
      };
      const onUserSubmit = async (event) => {
        event.preventDefault();
        if (!userForm.nickname.trim()) {
          addToast("ニックネームを入力してください", "error");
          return;
        }
        if (registerType === "host" && !userForm.customLocation.trim()) {
          addToast("開催場所を入力してください", "error");
          return;
        }
        if (userForm.availability.length === 0 || userForm.games.length === 0) {
          addToast("空きコマと希望タイトルを登録してください", "error");
          return;
        }
        setLoading(true);
        try {
          const commentStr = userForm.comment.trim() ? ` [COMM:${userForm.comment.trim()}]` : "";
          const snsStr = userForm.snsContact.trim() ? ` [SNS:${userForm.snsContact.trim()}]` : "";
          const capaStr = ` [CAPA:${userForm.capacity}]`;
          const locationStr = registerType === "host" ? ` (@${userForm.customLocation.trim()})` : "";
          const compositeNickname = `${userForm.nickname}${locationStr}${commentStr}${snsStr}${capaStr}`;
          await api.registerUser({
            role: registerType === "host" ? "professor" : "student", 
            nickname: compositeNickname,
            games: userForm.games, 
            availability: userForm.availability
          });
          addToast(registerType === "host" ? "部屋を立てました！" : "参加希望を登録しました！", "success");
          setStatusMessage(registerType === "host" ? "部屋を作成しました。参加者を待っています..." : "参加登録完了。");
          
          setUserForm({ 
            nickname: userForm.nickname, 
            customLocation: userForm.customLocation || "7A101", 
            games: [], 
            availability: [], 
            comment: "",
            snsContact: "",
            capacity: "4"
          });
          await refreshAll();
        } catch (err) {
          addToast(err.message, "error");
        } finally {
          setLoading(false);
        }
      };
      const handleManualJoinLobbyUser = (hostUser, chosenGame, slot) => {
        const rawNickname = hostUser.nickname || "";
        let extractedSns = "未登録";
        if (rawNickname.includes("[SNS:")) {
          extractedSns = rawNickname.split("[SNS:")[1].split("]")[0];
        }
        setActiveEvent({
          room: { name: hostUser.nickname.split("@")[1]?.split(" [")[0] || "学内指定場所" },
          slot: slot,
          matchedGame: chosenGame,
          hostSns: extractedSns,
        });
        setChatMessages([
          { id: 1, sender: "SYSTEM", text: "部屋への合流が成立しました。集合に向けて伝言板を活用してください。", time: "SYSTEM" }
        ]);
        setMatchedPeople([hostUser.nickname.split(" ")[0], "あなた"]);
        setView("event");
        addToast("マッチングが成立しました", "success");
      };
      const handleSendChatMessage = (e) => {
        e.preventDefault();
        if (!chatInput.trim()) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
        setChatMessages(prev => [...prev, { id: Date.now(), sender: "あなた", text: chatInput.trim(), time: timeStr }]);
        setChatInput("");
      };
      const filteredAndVisibleUsers = useMemo(() => {
        const now = new Date();
        const daysMap = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const currentDayValue = daysMap[now.getDay()]; 
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        return users
          .filter((u) => !deletedIds.includes(u.id))

                if (av.day !== currentDayValue) return false;
                if (av.end === "CUSTOM") return true;
                const [sh, sm] = av.start.split(":").map(Number);
                const [eh, em] = av.end.split(":").map(Number);
                return (currentMinutes >= (sh * 60 - 30) && currentMinutes <= (eh * 60));
              });
            }
            return true;
          });

                                opacity: isHost ? 1 : 0.4
                              }}
                              onClick={() => handleManualJoinLobbyUser(u, game, u.availability[0] || { day: "Mon", start: "12:15", end: "13:30" })}
                            >
                              {isHost ? `${game} 部屋に入る` : `${game} (探し中)`}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </section>
          {/* 履歴・ログ表示 */}
          <div style={{ textAlign: "center", marginTop: "40px" }}>
            <button type="button" className="btn-secondary" style={{ fontSize: "12px", padding: "6px 16px" }} onClick={() => setShowDebug(!showDebug)}>
              {showDebug ? "対戦履歴を非表示" : "対戦成立履歴・ログを表示"}
            </button>
          </div>
          {showDebug && (
            <section style={{ marginTop: "16px", borderColor: "#222" }}>
              <h2>MATCH HISTORY & DATABASE LOG</h2>
              <div style={{ marginBottom: "20px" }}>
                <h3>成立した対戦マッチ一覧</h3>
                {matches.length === 0 ? <p style={{ color: "#666" }}>履歴はありません</p> : (
                  <div className="table-responsive">
                    <table className="grid-table" style={{ background: "transparent" }}>
                      <thead>
                        <tr>
                          <th>部屋を立てた人 (ホスト)</th>
                          <th>部屋に参加した人</th>
                          <th>場所 (部屋名)</th>
                          <th>種目</th>
                        </tr>
                      </thead>
                      <tbody>
                        {matches.map((m) => (
                          <tr key={m.id}>
                            <td>{m.student?.nickname?.split(" ")[0] || m.studentId}</td>
                            <td>{m.professor?.nickname?.split(" ")[0] || m.professorId}</td>
                            <td>{m.room?.name || "確定場所"}</td>
                            <td style={{ color: "#ff007f" }}>{m.matchedGame}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </section>
          )}
        </div>
      );
    }
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
{% endraw %}
